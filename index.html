<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#D97757">
  <title>Bozzone Tasks</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon.svg">

  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.3/Sortable.min.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent: #D97757;
      --accent-light: #fff3ec;
      --accent-dark: #7a3a1e;
      --bg: #faf9f5;
      --card-bg: #fff;
      --card-header-bg: #f5f4ef;
      --border: #e5e4df;
      --text: #141413;
      --text-sec: #888;
      --text-muted: #aaa;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    [data-theme="dark"] {
      --bg: #111110;
      --card-bg: #1c1c1b;
      --card-header-bg: #262625;
      --border: #333;
      --text: #eee;
      --accent-light: #2c1a14;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 12px;
      padding-bottom: calc(80px + var(--safe-bottom));
      min-height: 100vh;
      -webkit-tap-highlight-color: transparent;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 2px solid var(--accent);
      padding-bottom: 10px;
      margin-bottom: 14px;
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 100;
      padding-top: env(safe-area-inset-top, 4px);
    }

    .hdr-right { display: flex; align-items: center; gap: 8px; }
    
    .sync-dot {
      width: 9px; height: 9px;
      border-radius: 50%;
      background: #ccc;
    }
    .sync-dot.on { background: #4CAF50; }

    .card {
      background: var(--card-bg);
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,.07);
      margin-bottom: 14px;
      overflow: hidden;
    }

    .card-hd {
      background: var(--card-header-bg);
      padding: 11px 14px;
      font-weight: 600;
      display: flex;
      justify-content: space-between;
    }

    .card-bd { padding: 10px 14px; }

    .task {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
    }

    .btn-add {
      background: var(--accent);
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }

    /* Modals */
    .modal-ov {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.5);
      display: none;
      align-items: center; justify-content: center;
      z-index: 1000;
    }
    .modal-ov.show { display: flex; }
    .modal-content {
      background: var(--card-bg);
      padding: 20px;
      border-radius: 12px;
      width: 90%;
      max-width: 400px;
    }

    input, textarea, select {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--bg);
      color: var(--text);
    }
  </style>
</head>
<body>

<header>
  <h1>Bozzone Tasks</h1>
  <div class="hdr-right">
    <div class="sync-dot" id="syncDot"></div>
    <button onclick="toggleDark()" style="background:none; border:none; cursor:pointer;">🌙</button>
  </div>
</header>

<div id="board"></div>

<div class="modal-ov" id="ntOv">
  <div class="modal-content">
    <h3>New Task</h3>
    <input type="text" id="ntTitle" placeholder="Task description...">
    <select id="ntSection"></select>
    <button class="btn-add" onclick="createTask()">Add Task</button>
    <button onclick="hideModal()" style="background:none; border:none; margin-left:10px; cursor:pointer;">Cancel</button>
  </div>
</div>

<script>
  let appData = { sections: [{id: 's1', title: 'Inbox', tasks: []}] };
  
  // Load from LocalStorage
  const saved = localStorage.getItem('bozzone_tasks');
  if (saved) appData = JSON.parse(saved);

  function save() {
    localStorage.setItem('bozzone_tasks', JSON.stringify(appData));
    render();
  }

  function render() {
    const board = document.getElementById('board');
    board.innerHTML = '';
    
    appData.sections.forEach(sec => {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <div class="card-hd">
          <span>${sec.title}</span>
          <button onclick="showModal('${sec.id}')" style="background:none; border:none; cursor:pointer;">➕</button>
        </div>
        <div class="card-bd" id="tasks-${sec.id}"></div>
      `;
      board.appendChild(card);

      const taskContainer = document.getElementById(`tasks-${sec.id}`);
      sec.tasks.forEach((task, idx) => {
        const tDiv = document.createElement('div');
        tDiv.className = 'task';
        tDiv.innerHTML = `
          <input type="checkbox" ${task.done ? 'checked' : ''} onchange="toggleTask('${sec.id}', ${idx})">
          <span style="${task.done ? 'text-decoration:line-through; opacity:0.5' : ''}">${task.text}</span>
        `;
        taskContainer.appendChild(tDiv);
      });
    });
  }

  let activeSecId = null;
  function showModal(secId) {
    activeSecId = secId;
    const select = document.getElementById('ntSection');
    select.innerHTML = appData.sections.map(s => `<option value="${s.id}" ${s.id === secId ? 'selected' : ''}>${s.title}</option>`).join('');
    document.getElementById('ntOv').classList.add('show');
    document.getElementById('ntTitle').focus();
  }

  function hideModal() {
    document.getElementById('ntOv').classList.remove('show');
    document.getElementById('ntTitle').value = '';
  }

  function createTask() {
    const text = document.getElementById('ntTitle').value;
    const secId = document.getElementById('ntSection').value;
    if (!text) return;

    const sec = appData.sections.find(s => s.id === secId);
    sec.tasks.push({ text: text, done: false });
    save();
    hideModal();
  }

  function toggleTask(secId, index) {
    const sec = appData.sections.find(s => s.id === secId);
    sec.tasks[index].done = !sec.tasks[index].done;
    save();
  }

  function toggleDark() {
    document.body.hasAttribute('data-theme') 
      ? document.body.removeAttribute('data-theme') 
      : document.body.setAttribute('data-theme', 'dark');
  }

  // Initial Render
  render();
</script>
</body>
</html>
