<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#D97757">
  <title>My Day</title>
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon.svg">

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent: #D97757;
      --bg: #faf9f5;
      --card-bg: #fff;
      --border: #e5e4df;
      --text: #141413;
      --text-sec: #888;
      --text-muted: #bbb;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      min-height: 100dvh;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── Header ── */
    header {
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 100;
      border-bottom: 2px solid var(--accent);
      padding: env(safe-area-inset-top, 8px) 16px 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    header h1 {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--accent);
    }
    .hdr-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .sync-dot {
      width: 9px; height: 9px;
      border-radius: 50%;
      background: #ccc;
      transition: background .3s;
      flex-shrink: 0;
    }
    .sync-dot.green  { background: #4CAF50; }
    .sync-dot.yellow { background: #FFC107; }
    .sync-dot.red    { background: #f44336; }

    /* ── Main content ── */
    main {
      max-width: 600px;
      margin: 0 auto;
      padding: 16px 12px calc(32px + var(--safe-bottom));
    }

    /* ── Hero header ── */
    .hero {
      text-align: center;
      padding: 20px 16px 24px;
      background: linear-gradient(135deg, #fff9f0, var(--card-bg));
      border-radius: 14px;
      margin-bottom: 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
    }
    .hero-sun { font-size: 2.4rem; margin-bottom: 8px; }
    .hero-count {
      font-size: 2rem;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 6px;
    }
    .hero-sub {
      font-size: .88rem;
      color: var(--text-sec);
    }

    /* ── Task list ── */
    .task-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .task-row {
      background: var(--card-bg);
      border-radius: 12px;
      padding: 13px 14px;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      border-left: 4px solid var(--border);
      box-shadow: 0 1px 3px rgba(0,0,0,.05);
      transition: border-color .2s, opacity .2s;
      cursor: pointer;
      -webkit-user-select: none;
      user-select: none;
    }
    .task-row:active { opacity: .75; }
    .task-row.status-inprogress { border-left-color: var(--accent); }
    .task-row.status-done {
      border-left-color: #ccc;
      opacity: .55;
    }
    .task-row.status-done .task-label { text-decoration: line-through; color: var(--text-sec); }

    /* ── Status circle button ── */
    .status-btn {
      flex-shrink: 0;
      width: 26px; height: 26px;
      border-radius: 50%;
      border: 2px solid var(--border);
      background: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .8rem;
      transition: all .15s;
      margin-top: 1px;
      color: #888;
    }
    .status-btn:active { transform: scale(.9); }
    .status-btn[data-status="inprogress"] {
      border-color: var(--accent);
      background: rgba(217,119,87,.1);
      color: var(--accent);
    }
    .status-btn[data-status="done"] {
      border-color: #4CAF50;
      background: #4CAF50;
      color: #fff;
    }

    /* ── Task text & meta ── */
    .task-content { flex: 1; min-width: 0; }
    .task-label {
      display: block;
      font-size: .97rem;
      font-weight: 500;
      color: var(--text);
      line-height: 1.4;
      margin-bottom: 3px;
    }
    .task-meta {
      font-size: .75rem;
      color: var(--text-sec);
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
    }
    .due-chip {
      background: rgba(217,119,87,.12);
      color: var(--accent);
      border-radius: 4px;
      padding: 1px 6px;
      font-size: .72rem;
      font-weight: 500;
    }
    .due-chip.overdue {
      background: rgba(244,67,54,.12);
      color: #e53935;
    }
    .priority-dot {
      display: inline-block;
      width: 7px; height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .priority-dot.high   { background: #e53935; }
    .priority-dot.medium { background: #FB8C00; }
    .priority-dot.low    { background: #43A047; }

    /* ── Done section ── */
    .done-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 24px 0 10px;
      cursor: pointer;
      color: var(--text-sec);
      font-size: .82rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .04em;
      -webkit-user-select: none;
      user-select: none;
    }
    .done-toggle:active { opacity: .7; }
    .done-caret { font-size: .7rem; transition: transform .2s; }
    .done-caret.open { transform: rotate(90deg); }
    #doneList { display: none; }
    #doneList.open { display: flex; flex-direction: column; gap: 10px; }

    /* ── Empty state ── */
    .empty {
      text-align: center;
      padding: 48px 20px;
      color: var(--text-muted);
      font-size: .9rem;
      line-height: 1.8;
    }
    .empty-icon { font-size: 2.8rem; margin-bottom: 12px; }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: calc(24px + var(--safe-bottom));
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #333;
      color: #fff;
      padding: 8px 18px;
      border-radius: 20px;
      font-size: .82rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s, transform .25s;
      white-space: nowrap;
      z-index: 999;
    }
    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── Back link ── */
    .back-link {
      font-size: .82rem;
      color: var(--text-sec);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 2px 4px;
      border-radius: 4px;
      transition: color .15s;
    }
    .back-link:hover { color: var(--accent); }
  </style>
</head>
<body>

<header>
  <a class="back-link" href="index.html">&#8592; Full App</a>
  <h1>My Day</h1>
  <div class="hdr-right">
    <div class="sync-dot" id="dot" title="Sync status"></div>
  </div>
</header>

<main>
  <div class="hero" id="hero">
    <div class="hero-sun">☀️</div>
    <div class="hero-count" id="heroCount">—</div>
    <div class="hero-sub" id="heroSub">Loading…</div>
  </div>

  <div class="task-list" id="taskList"></div>

  <div class="done-toggle" id="doneToggle" style="display:none;">
    <span class="done-caret" id="doneCaret">&#9654;</span>
    <span id="doneLabel">Completed</span>
  </div>
  <div class="task-list" id="doneList"></div>
</main>

<div id="toast"></div>

<script>
/* ================================================================
   CONFIG — same Firebase project as main app
   ================================================================ */
var firebaseConfig = {
  apiKey: "AIzaSyCmZWuIQ6NzvS2Lhzo725Wf6Cnro6NKWzI",
  authDomain: "todomyway-185c9.firebaseapp.com",
  databaseURL: "https://todomyway-185c9-default-rtdb.firebaseio.com",
  projectId: "todomyway-185c9",
  storageBucket: "todomyway-185c9.firebasestorage.app",
  messagingSenderId: "213165358695",
  appId: "1:213165358695:web:f166a7cc6772f8a54a1ec2"
};

/* ================================================================
   STATE
   ================================================================ */
var appData  = { sections: [], tags: [] };
var syncKey  = localStorage.getItem('bozzone-sync-key');
var dbRef    = null;
var fbReady  = false;

/* ================================================================
   HELPERS
   ================================================================ */
function dot(cls) {
  document.getElementById('dot').className = 'sync-dot ' + cls;
}

function showToast(msg) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(function() { el.classList.remove('show'); }, 2000);
}

function findSec(id) {
  var secs = appData.sections || [];
  for (var i = 0; i < secs.length; i++) {
    if (secs[i].id === id) return secs[i];
  }
  return null;
}

function ensureArrays(d) {
  if (!d) return { sections: [], tags: [], groups: [] };
  if (!Array.isArray(d.sections)) {
    var arr = [];
    Object.keys(d.sections || {}).forEach(function(k) { arr.push(d.sections[k]); });
    d.sections = arr;
  }
  (d.sections || []).forEach(function(sec) {
    if (!Array.isArray(sec.tasks)) {
      var ta = [];
      Object.keys(sec.tasks || {}).forEach(function(k) { ta.push(sec.tasks[k]); });
      sec.tasks = ta;
    }
    (sec.tasks || []).forEach(function(t) {
      if (!Array.isArray(t.subtasks)) t.subtasks = [];
      if (!Array.isArray(t.tags)) t.tags = [];
    });
  });
  if (!Array.isArray(d.tags)) d.tags = [];
  if (!Array.isArray(d.groups)) d.groups = [];
  return d;
}

/* ================================================================
   STORAGE
   ================================================================ */
function loadLS() {
  try {
    var s = localStorage.getItem('bozzone-app-v2');
    if (s) { appData = ensureArrays(JSON.parse(s)); }
  } catch (e) {}
}

function saveLS() {
  try { localStorage.setItem('bozzone-app-v2', JSON.stringify(appData)); } catch (e) {}
}

function save() {
  saveLS();
  if (fbReady && dbRef) {
    dbRef.set(appData);
  } else {
    render();
  }
}

/* ================================================================
   CYCLE STATUS
   ================================================================ */
function cycleStatus(secId, taskId) {
  var sec = findSec(secId);
  if (!sec) return;
  for (var i = 0; i < sec.tasks.length; i++) {
    if (sec.tasks[i].id === taskId) {
      var cur = sec.tasks[i].status || 'todo';
      var next = cur === 'todo' ? 'done' : cur === 'done' ? 'todo' : 'done';
      sec.tasks[i].status = next;
      sec.tasks[i].done   = (next === 'done');
      var msg = next === 'done' ? 'Task done! ✓' : 'Marked to do';
      showToast(msg);
      break;
    }
  }
  save();
}

/* ================================================================
   RENDER
   ================================================================ */
function buildTaskRow(item, isDone) {
  var t = item.task;
  var status = t.status || (t.done ? 'done' : 'todo');

  var row = document.createElement('div');
  row.className = 'task-row status-' + status;

  /* Status circle */
  var btn = document.createElement('button');
  btn.className = 'status-btn';
  btn.setAttribute('data-status', status);
  btn.title = status === 'done' ? 'Mark incomplete' : 'Mark complete';
  if (status === 'done') btn.innerHTML = '&#10003;';
  else if (status === 'inprogress') btn.innerHTML = '&#9680;';
  (function(sid, tid) {
    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      cycleStatus(sid, tid);
    });
  })(item.secId, t.id);
  row.appendChild(btn);

  /* Content */
  var content = document.createElement('div');
  content.className = 'task-content';

  var label = document.createElement('span');
  label.className = 'task-label';
  label.textContent = t.text;
  content.appendChild(label);

  /* Meta line */
  var meta = document.createElement('div');
  meta.className = 'task-meta';

  if (t.priority) {
    var pd = document.createElement('span');
    pd.className = 'priority-dot ' + t.priority;
    pd.title = t.priority + ' priority';
    meta.appendChild(pd);
    var pt = document.createElement('span');
    pt.textContent = t.priority.charAt(0).toUpperCase() + t.priority.slice(1);
    meta.appendChild(pt);
  }

  if (t.dueDate) {
    var chip = document.createElement('span');
    var d = new Date(t.dueDate + 'T00:00:00');
    var today = new Date(); today.setHours(0,0,0,0);
    chip.className = 'due-chip' + (d < today && status !== 'done' ? ' overdue' : '');
    chip.textContent = 'Due: ' + d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
    meta.appendChild(chip);
  }

  if (meta.children.length) content.appendChild(meta);
  row.appendChild(content);

  return row;
}

function render() {
  var active = [], done = [];

  (appData.sections || []).forEach(function(sec) {
    (sec.tasks || []).forEach(function(task) {
      if (!task.myDay) return;
      var status = task.status || (task.done ? 'done' : 'todo');
      var item = { task: task, secId: sec.id, secTitle: sec.title };
      if (status === 'done') done.push(item);
      else active.push(item);
    });
  });

  /* Hero */
  var count = active.length;
  var heroCount = document.getElementById('heroCount');
  var heroSub   = document.getElementById('heroSub');
  heroCount.textContent = count + (count === 1 ? ' task' : ' tasks');
  heroSub.textContent   = count === 0
    ? 'All done! Great work today. 🎉'
    : 'Focus on your day. Get started!';

  /* Active tasks */
  var list = document.getElementById('taskList');
  list.innerHTML = '';
  if (!count && !done.length) {
    var empty = document.createElement('div');
    empty.className = 'empty';
    empty.innerHTML = '<div class="empty-icon">☀️</div>No tasks in My Day.<br>Open the full app and tap ☀️ on any task.';
    list.appendChild(empty);
  } else {
    active.forEach(function(item) {
      list.appendChild(buildTaskRow(item, false));
    });
  }

  /* Done section */
  var doneToggle = document.getElementById('doneToggle');
  var doneList   = document.getElementById('doneList');
  var doneLabel  = document.getElementById('doneLabel');
  if (done.length) {
    doneToggle.style.display = 'flex';
    doneLabel.textContent = 'Completed (' + done.length + ')';
    doneList.innerHTML = '';
    done.forEach(function(item) {
      doneList.appendChild(buildTaskRow(item, true));
    });
  } else {
    doneToggle.style.display = 'none';
    doneList.innerHTML = '';
    doneList.classList.remove('open');
    document.getElementById('doneCaret').classList.remove('open');
  }
}

/* ================================================================
   DONE SECTION TOGGLE
   ================================================================ */
document.getElementById('doneToggle').addEventListener('click', function() {
  var dl = document.getElementById('doneList');
  var caret = document.getElementById('doneCaret');
  var open = dl.classList.toggle('open');
  caret.classList.toggle('open', open);
});

/* ================================================================
   FIREBASE
   ================================================================ */
firebase.initializeApp(firebaseConfig);
fbReady = true;

if (syncKey) {
  dot('yellow');
  dbRef = firebase.database().ref('dashboards/' + syncKey + '/v2');

  firebase.database().ref('.info/connected').on('value', function(s) {
    dot(s.val() ? 'green' : 'yellow');
  });

  dbRef.on('value', function(snap) {
    if (!snap.val()) return;
    appData = ensureArrays(snap.val());
    saveLS();
    render();
  });
} else {
  /* No sync key — use local storage only */
  dot('red');
  loadLS();
  render();
}
</script>
</body>
</html>
