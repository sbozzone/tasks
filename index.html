<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#D97757">
  <title>Bozzone Tasks</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon.svg">

  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.3/Sortable.min.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent: #D97757;
      --accent-light: #fff3ec;
      --accent-dark: #7a3a1e;
      --bg: #faf9f5;
      --card-bg: #fff;
      --card-header-bg: #f5f4ef;
      --border: #e5e4df;
      --text: #141413;
      --text-sec: #888;
      --text-muted: #aaa;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 12px;
      padding-bottom: calc(80px + var(--safe-bottom));
      min-height: 100vh;
      min-height: 100dvh;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── Header ─────────────────────────────────── */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 2px solid var(--accent);
      padding-bottom: 10px;
      margin-bottom: 14px;
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 100;
      padding-top: env(safe-area-inset-top, 4px);
    }
    header h1 {
      font-size: 1.1rem;
      color: var(--accent);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .hdr-right {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }
    .sync-dot {
      width: 9px; height: 9px;
      border-radius: 50%;
      background: #ccc;
      transition: background .3s;
    }
    .sync-dot.on  { background: #4CAF50; }
    .sync-dot.wait { background: #FFC107; }
    .sync-dot.off  { background: #F44336; }
    .key-label {
      font-size: .7rem;
      color: var(--text-sec);
      cursor: pointer;
    }
    .gear {
      background: none; border: none;
      font-size: 1.15rem; cursor: pointer;
      padding: 4px; opacity: .45;
    }
    .gear:hover, .gear:active { opacity: 1; }

    /* ── Focus Banner ───────────────────────────── */
    .focus {
      background: var(--accent-light);
      border-left: 4px solid var(--accent);
      padding: 9px 12px;
      border-radius: 4px;
      margin-bottom: 14px;
      font-size: .84rem;
      color: var(--accent-dark);
      line-height: 1.4;
    }

    /* ── Overall Progress ───────────────────────── */
    .overall {
      margin-bottom: 14px;
      padding: 10px 14px;
      background: var(--card-bg);
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,.07);
    }
    .overall-top {
      display: flex;
      justify-content: space-between;
      font-size: .82rem;
      margin-bottom: 5px;
      color: var(--text-sec);
    }
    .bar-wrap {
      background: #eee;
      border-radius: 6px;
      height: 7px;
      overflow: hidden;
    }
    .bar {
      height: 100%;
      background: var(--accent);
      border-radius: 6px;
      transition: width .35s ease;
    }

    /* ── Filter Bar ─────────────────────────────── */
    .filter-bar {
      display: flex;
      gap: 7px;
      margin-bottom: 14px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      padding: 2px 0;
      scrollbar-width: none;
      align-items: center;
    }
    .filter-bar::-webkit-scrollbar { display: none; }
    .filter-btn {
      flex-shrink: 0;
      padding: 5px 13px;
      border-radius: 18px;
      border: 1.5px solid var(--border);
      background: var(--card-bg);
      font-size: .76rem;
      font-family: inherit;
      cursor: pointer;
      color: var(--text-sec);
      transition: all .2s;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .filter-btn:active { transform: scale(.96); }
    .filter-btn.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .filter-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .filter-count {
      font-size: .68rem;
      opacity: .75;
    }
    .filter-manage-btn {
      flex-shrink: 0;
      width: 28px; height: 28px;
      border-radius: 50%;
      border: 1.5px dashed var(--border);
      background: none;
      font-size: .9rem;
      cursor: pointer;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .filter-manage-btn:active { background: var(--accent-light); }

    /* ── Grid ────────────────────────────────────── */
    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
    }
    @media (min-width: 700px)  { .grid { grid-template-columns: repeat(2,1fr); } body { padding: 20px; } header h1 { font-size: 1.35rem; } }
    @media (min-width: 1100px) { .grid { grid-template-columns: repeat(3,1fr); } }

    /* ── Group wrapper ── */
    .group-wrapper {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
    }
    @media (min-width: 700px)  { .group-wrapper { grid-template-columns: repeat(2,1fr); } }
    @media (min-width: 1100px) { .group-wrapper { grid-template-columns: repeat(3,1fr); } }
    .group-wrapper .group-header { grid-column: 1 / -1; }

    /* ── Cards ───────────────────────────────────── */
    .card {
      background: var(--card-bg);
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,.07);
      overflow: hidden;
    }
    .card-hd {
      background: var(--card-header-bg);
      padding: 11px 14px;
      font-weight: 600;
      font-size: .88rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .card-bd { padding: 10px 14px; }

    /* ── Add Column Card ────────────────────────── */
    .add-col-card {
      background: var(--card-bg);
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,.04);
      border: 2px dashed var(--border);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100px;
      cursor: pointer;
      transition: border-color .2s, background .2s;
      padding: 20px;
    }
    .add-col-card:hover, .add-col-card:active {
      border-color: var(--accent);
      background: var(--accent-light);
    }
    .add-col-card.expanded {
      cursor: default;
      border-color: var(--accent);
      align-items: stretch;
    }

    /* ── Tasks ───────────────────────────────────── */
    .task {
      display: flex;
      align-items: flex-start;
      gap: 6px;
      padding: 8px 0;
      border-bottom: 1px solid #f0efea;
      font-size: .86rem;
      line-height: 1.42;
      background: var(--card-bg);
    }
    .task-content {
      flex: 1;
      min-width: 0;
    }

    /* ── Task action buttons ─────────────────────── */
    .task-actions {
      display: flex;
      align-items: center;
      gap: 2px;
      flex-shrink: 0;
      margin-top: 1px;
    }
    .tag-btn, .del-btn {
      background: none; border: none;
      color: #ccc; cursor: pointer;
      padding: 3px 4px; transition: color .15s;
    }
    .del-btn:hover { color: #e74c3c; }

    /* ── Search Bar ──────────────────────────────── */
    .search-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #fff;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 8px 12px;
      margin-bottom: 12px;
    }

    /* ── Status Button ───────── */
    .status-btn {
      width: 22px; height: 22px;
      border-radius: 50%;
      border: 2px solid #ccc;
      background: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    /* ── Toast (undo) ────────────────────────────── */
    .toast {
      position: fixed;
      bottom: calc(20px + var(--safe-bottom));
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #333;
      color: #fff;
      padding: 11px 18px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      gap: 14px;
      font-size: .86rem;
      box-shadow: 0 4px 20px rgba(0,0,0,.3);
      transition: transform .3s ease;
      z-index: 500;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    /* ── Modals ────────────────────────────── */
    .nt-ov, .tm-ov, .tp-ov {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.5);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 20px;
    }
    .nt-ov.show, .tm-ov.show, .tp-ov.show { display: flex; }

    /* ── Keyboard Shortcuts ────────────────────── */
    .kbd-panel {
      position: fixed; top: 70px; right: 20px;
      background: #fff; border-radius: 12px;
      padding: 16px; box-shadow: 0 8px 32px rgba(0,0,0,.15);
      z-index: 800; display: none;
    }
    .kbd-panel.show { display: block; }

    [data-theme="dark"] {
      --bg: #111110;
      --card-bg: #1c1c1b;
      --card-header-bg: #262625;
      --border: #333;
      --text: #eee;
    }
  </style>
</head>
<body>

<header>
  <h1>Bozzone Tasks</h1>
  <div class="hdr-right">
    <div class="sync-dot" id="syncDot" title="Sync status"></div>
    <span class="key-label" id="keyLbl"></span>
    <button class="gear" id="darkToggle">🌙</button>
    <button class="gear" id="kbdBtn">⌨️</button>
    <button class="gear" id="gearBtn">&#9881;</button>
  </div>
</header>

<div class="search-wrap">
  <span>🔍</span>
  <input type="text" id="searchInput" placeholder="Search tasks…">
</div>

<div class="focus" id="focusDiv">
  <strong>FOCUS:</strong> <span id="focusText">...</span>
</div>

<div class="overall">
  <div class="overall-top">
    <span id="oLabel">Overall Progress</span>
    <span id="oPct">0%</span>
  </div>
  <div class="bar-wrap">
    <div class="bar" id="oBar" style="width:0%"></div>
  </div>
</div>

<div class="filter-bar" id="filterBar"></div>
<div class="grid" id="board"></div>

<div class="kbd-panel" id="kbdPanel">
  <strong>⌨️ Shortcuts</strong>
  <div><kbd>N</kbd> New task</div>
  <div><kbd>/</kbd> Search</div>
  <div><kbd>D</kbd> Dark mode</div>
  <div><kbd>Esc</kbd> Close</div>
</div>

<div class="toast" id="toast">
  <span id="toastMsg"></span>
  <button class="toast-undo" id="toastUndo">UNDO</button>
</div>

<div class="tp-ov" id="tpOv"><div class="tp-box" id="tpBox"></div></div>
<div class="tm-ov" id="tmOv"><div class="tm-box" id="tmBox"></div></div>
<div class="nt-ov" id="ntOv">
  <div class="nt-box">
    <h2>➕ Create Task</h2>
    <button id="ntCreate">Create</button>
    <button onclick="hideNewTaskModal()">Cancel</button>
  </div>
</div>

<script>
  /* Simplified Core Logic */
  let appData = { sections: [], tags: [], groups: [] };
  
  function render() {
    const board = document.getElementById('board');
    board.innerHTML = '';
    
    appData.sections.forEach(sec => {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `<div class="card-hd">${sec.icon} ${sec.title}</div><div class="card-bd"></div>`;
      board.appendChild(card);
    });

    // Add Column Action Card
    const addCard = document.createElement('div');
    addCard.className = 'add-col-card';
    addCard.innerHTML = '<div>+ Add Column</div>';
    addCard.onclick = () => { /* Logic to add column */ };
    board.appendChild(addCard);
  }

  // Keyboard Shortcuts
  window.addEventListener('keydown', (e) => {
    if (e.key.toLowerCase() === 'n') showNewTaskModal();
    if (e.key === '/') document.getElementById('searchInput').focus();
    if (e.key.toLowerCase() === 'd') toggleDarkMode();
  });

  // Load Initial Data
  render();
</script>
</body>
</html>
